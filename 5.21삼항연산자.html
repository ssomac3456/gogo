<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        //삼항연산자
        //=>참 또는 거짓조건을 간단하게 사용 가능
        //ex)조건 ? 참일때 실행할 내용 : 거짓일때 실행할 내용

        const num_1 = Number(prompt("첫번째 숫자를 입력해주세요."))
        const num_2 = Number(prompt("두번째 숫자를 입력해주세요."))


        const result = num_1 > num_2 ? "첫번째 숫자가 큽니다" : "두번째 숫자가 큽니다";

        console.log(result);

    </script>
