<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        
        //조건문
        //=>조건에 따라 코드를 수행할지 말지 판단하여 실행함
        //if(조건1){블럭}
        //=>조건이 참이면 블럭의 내용을 실행함

        //=>else{}
        //=>if의 조건이 거짓일때 실행됨

        //else if(조건2){}
        //=>if의 조건이 거짓이고 그다음 조건으로 사용되며 이조건 또한 거짓이면 else로 넘어감

        const num_1 = '';
        const num_2 = 100;

       

        if(num_1 < num_2){
            document.write('첫번째 입력한 숫자가 더 큽니다');
        }else if(num_1 === num_2){
            document.write('첫번째 두번째 숫자가 같습니다.')
        }else if(num_1 > num_2){   
            document.write('두번째 입력한 숫자가 더 큽니다');
        }else{
            document.write('입력한 값을 다시 확인해주세요')
        }

    

        //첫번째가 큼
        //두번째가 큼
        //같음
        //숫자가 아닐때

    </script>
