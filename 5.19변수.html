<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>

        /* 변수
        =>특정 값을 저장할때 사용
        =>숫자, 문자, 함수.... 등 저장가능
        =>변수를 작성할때 var를 작성하고 시작함 */



        var a = 1; /* 변수선언 변수 a 문자만됨 변하는 수*/
        
        console.log(a);/* 검사창 콘솔에 기록됨 */

        document.write(a);/* html이라는 문서에 적겠다/body에 내용을 작성함 */

    </script>
</head>

</html>
