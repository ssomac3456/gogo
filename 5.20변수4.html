<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var a = 10;
        console.log(a);  


        a = 20;
        console.log('변수값 변경:' + a);


        /* const는 상수로 값을 변경하면 안될때 사용 */
        const num_1 = 10;
        console.log('변경 전 변수값:' + num_1);

       /*  num_1 =50;
        console.log('변경 후 변수값:' + num_1); */

        let num_2 = 50;
        console.log('let의 값:' + num_2);


        num_2 = 'let의 값을 변경함';
        console.log('let의 값:' + num_2);
    </script>
</head>
<body>
    
</body>
</html>
