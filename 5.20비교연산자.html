<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
         const num_1 = 10;
         const num_2 = '10';

         document.write('<h2>비교연산자</h2>');
         document.write('<h5>왼쪽이 더 큼' + (num_1 > num_2) + '</h5>');
         document.write('<h5> 오른쪽이 더 큼' + (num_1 < num_2) + '</h5>');
         document.write('<h5> 왼쪽이 더 크거나 같다' + (num_1 >= num_2) + '</h5>');
         document.write('<h5> 오른쪽쪽이 더 크거나 같다' + (num_1 <= num_2) + '</h5>');
         document.write('<h5> 두 값이 같다' + (num_1 == num_2) + '</h5>');
         document.write('<h5> 두 값이 같지 않다' + (num_1 != num_2) + '</h5>');
         document.write('<h5> 두 값이 타입까지 같지 않다' + (num_1 !== num_2) + '</h5>');
         document.write('<h5> 두 값이 타입까지 같다' + (num_1 === num_2) + '</h5>');
    </script>
</head>
<body>
    
</body>
</html>
