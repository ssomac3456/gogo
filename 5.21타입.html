    <title>Document</title>
    <script>

        //기본 타입
        //=>number:숫자
        //=>string: 문자
        //=>boolean: 참/거짓
        //=>nan:Not a Nimber
        //=>null:값이 없음
        //=>undefined: 정의되지 않음

        const num_1 = 10;
        const text = 'js';
        const bool = true;
        const un = undefined;
        let un_2;


        // typeof()
        //=> 어떤 타입인지 확인할때 사용하는 메서드(함수)


        console.log(typeof(num_1));
        console.log(typeof(text));
        console.log(typeof(bool));
        console.log(typeof(un));
        console.log(typeof(un_2));

    </script>
