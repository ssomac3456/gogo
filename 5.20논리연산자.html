<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>Document</title>
    <script>
          
        /* 논리연산자
        =>두개 이상의 항을 비교할때 사용
        1)and(&&)
        => 두값을 비교하여 하나라도 거짓이 있으면 거짓을 반환함 , 완벽해야하는때에 사용 로그인등
        2)or(||)
        => 두값을 비교하여 하나라도 참이 있으면 참을 반환함 
        3)NOT(!)
        =>참은 거짓 거짓은 참으로 반대로 반환함 */


        const num_1 = 10;
        const num_2 = 5;
        const result = num_1 > num_2;

        console.log(num_1 > num_2 && num_1 < num_2);
        console.log(num_1 > num_2 || num_1 < num_2);
        /* console.log(num_1 > num_2 ! num_1 < num_2);
 */
        console.log(!(num_1 > num_2));

    </script>
